<style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #e0f2f1; color: #004d40; }
    .circle { width: 150px; height: 150px; background: #80cbc4; border-radius: 50%; transition: transform 4s ease-in-out; }
    .expand { transform: scale(1.8); }
    h2 { margin-top: 20px; font-weight: 300; }
</style>

<div class="circle" id="breath-circle"></div>
<h2 id="instruction">Inhale...</h2>

<script>
    const circle = document.getElementById('breath-circle');
    const text = document.getElementById('instruction');

    function breathe() {
        text.innerText = "Inhale...";
        circle.classList.add('expand');
        setTimeout(() => {
            text.innerText = "Exhale...";
            circle.classList.remove('expand');
        }, 4000);
    }

    setInterval(breathe, 8000);
    breathe();
</script>
