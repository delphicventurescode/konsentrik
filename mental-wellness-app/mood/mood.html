<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mood Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #fff9f0;
            color: #4a4a4a;
        }
        .emoji-btn {
            font-size: 2.5rem;
            border: none;
            background: none;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0 10px;
        }
        .emoji-btn:hover { transform: scale(1.2); }
        .history {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h2>How are you feeling?</h2>
    <div class="selector">
        <button class="emoji-btn" onclick="saveMood('😊')">😊</button>
        <button class="emoji-btn" onclick="saveMood('😐')">😐</button>
        <button class="emoji-btn" onclick="saveMood('😔')">😔</button>
        <button class="emoji-btn" onclick="saveMood('😤')">😤</button>
    </div>

    <div class="history">
        <h3>Recent History</h3>
        <div id="mood-log"></div>
    </div>

    <script>
        function saveMood(emoji) {
            const now = new Date().toLocaleString();
            const log = JSON.parse(localStorage.getItem('moodHistory') || '[]');
            log.unshift({ emoji, time: now });
            
            // Keep only the last 10 entries
            localStorage.setItem('moodHistory', JSON.stringify(log.slice(0, 10)));
            displayMoods();
        }

        function displayMoods() {
            const container = document.getElementById('mood-log');
            const log = JSON.parse(localStorage.getItem('moodHistory') || '[]');
            container.innerHTML = log.map(item => `
                <div class="log-item">
                    <span>${item.emoji}</span>
                    <small>${item.time}</small>
                </div>
            `).join('');
        }

        // Load on start
        displayMoods();
    </script>
</body>
</html>
